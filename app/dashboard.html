<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Observability Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-blue: #3b82f6;
            --accent-green: #10b981;
            --accent-purple: #8b5cf6;
            --accent-red: #ef4444;
            --accent-orange: #f59e0b;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 2rem;
            min-height: 100vh;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .header h1 {
            margin: 0;
            font-size: 1.8rem;
            font-weight: 600;
            letter-spacing: -0.5px;
        }
        .status {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
            color: var(--text-muted);
        }
        .status-dot {
            width: 10px;
            height: 10px;
            background-color: var(--accent-green);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--accent-green);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { opacity: 0.6; box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { opacity: 1; box-shadow: 0 0 0 6px rgba(16, 185, 129, 0); }
            100% { opacity: 0.6; box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 1.5rem;
        }
        .panel {
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 1.5rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
        }
        .panel:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 12px rgba(0, 0, 0, 0.2);
        }
        .panel h3 {
            margin: 0 0 1rem 0;
            font-size: 1.1rem;
            color: var(--text-muted);
            font-weight: 500;
        }
        .chart-container {
            position: relative;
            flex-grow: 1;
            min-height: 200px;
        }
        .big-number {
            font-size: 3.5rem;
            font-weight: 700;
            margin: auto 0;
            background: linear-gradient(135deg, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .sub-number {
            font-size: 1rem;
            color: var(--text-muted);
            margin-top: 0.5rem;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Observability Dashboard</h1>
        <div class="status">
            <div class="status-dot" id="status-indicator"></div>
            <span id="last-updated">Updating...</span>
        </div>
    </div>

    <div class="dashboard-grid">
        <!-- 1. Latency -->
        <div class="panel">
            <h3>Latency (P50/P95/P99)</h3>
            <div class="chart-container">
                <canvas id="latencyChart"></canvas>
            </div>
        </div>

        <!-- 2. Traffic -->
        <div class="panel">
            <h3>Traffic (Requests)</h3>
            <div class="chart-container" style="display: flex; flex-direction: column; align-items: center; justify-content: center;">
                <div class="big-number" id="trafficTotal">0</div>
                <div class="sub-number">Total Requests Served</div>
            </div>
        </div>

        <!-- 3. Error Rate -->
        <div class="panel">
            <h3>Error Breakdown</h3>
            <div class="chart-container">
                <canvas id="errorChart"></canvas>
            </div>
        </div>

        <!-- 4. Cost over time -->
        <div class="panel">
            <h3>Cost Tracking (USD)</h3>
            <div class="chart-container" style="display: flex; flex-direction: column; align-items: center; justify-content: center;">
                <div class="big-number" id="costTotal">$0.000</div>
                <div class="sub-number" id="costAvg">Avg: $0.000 / req</div>
            </div>
        </div>

        <!-- 5. Tokens -->
        <div class="panel">
            <h3>Tokens In vs Out</h3>
            <div class="chart-container">
                <canvas id="tokenChart"></canvas>
            </div>
        </div>

        <!-- 6. Quality Proxy -->
        <div class="panel">
            <h3>Quality Score (Avg)</h3>
            <div class="chart-container" style="display: flex; flex-direction: column; align-items: center; justify-content: center;">
                <div class="big-number" id="qualityAvg">0.0</div>
                <div class="sub-number">Heuristic Score (0 - 1)</div>
            </div>
        </div>
    </div>

    <script>
        // Chart configuration
        Chart.defaults.color = '#94a3b8';
        Chart.defaults.font.family = 'Inter';
        
        let latencyChart, errorChart, tokenChart;
        let timeLabels = [];
        let p50Data = [], p95Data = [], p99Data = [];
        const maxDataPoints = 20;

        function initCharts() {
            // Latency Chart
            const ctxLatency = document.getElementById('latencyChart').getContext('2d');
            latencyChart = new Chart(ctxLatency, {
                type: 'line',
                data: {
                    labels: timeLabels,
                    datasets: [
                        { label: 'P50', borderColor: '#3b82f6', backgroundColor: 'rgba(59, 130, 246, 0.1)', data: p50Data, tension: 0.4, fill: true },
                        { label: 'P95', borderColor: '#f59e0b', backgroundColor: 'rgba(245, 158, 11, 0.1)', data: p95Data, tension: 0.4 },
                        { label: 'P99', borderColor: '#ef4444', backgroundColor: 'rgba(239, 68, 68, 0.1)', data: p99Data, tension: 0.4 }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: { 
                        y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.05)' } }, 
                        x: { grid: { display: false } } 
                    },
                    animation: { duration: 0 },
                    plugins: { legend: { position: 'top' } }
                }
            });

            // Error Chart
            const ctxError = document.getElementById('errorChart').getContext('2d');
            errorChart = new Chart(ctxError, {
                type: 'doughnut',
                data: { 
                    labels: ['No Errors'], 
                    datasets: [{ data: [1], backgroundColor: ['#1e293b'], borderWidth: 0 }] 
                },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false, 
                    plugins: { legend: { position: 'right' } },
                    cutout: '70%'
                }
            });

            // Token Chart
            const ctxToken = document.getElementById('tokenChart').getContext('2d');
            tokenChart = new Chart(ctxToken, {
                type: 'bar',
                data: { 
                    labels: ['Tokens'], 
                    datasets: [
                        { label: 'Input', backgroundColor: '#8b5cf6', data: [0], borderRadius: 4 },
                        { label: 'Output', backgroundColor: '#10b981', data: [0], borderRadius: 4 }
                    ]
                },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false, 
                    scales: { 
                        y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.05)' } }, 
                        x: { grid: { display: false } } 
                    } 
                }
            });
        }

        async function fetchMetrics() {
            try {
                const response = await fetch('/metrics');
                const data = await response.json();
                updateDashboard(data);
                
                const now = new Date();
                document.getElementById('last-updated').innerText = 'Last updated: ' + now.toLocaleTimeString();
                document.getElementById('status-indicator').style.backgroundColor = 'var(--accent-green)';
            } catch (err) {
                console.error("Failed to fetch metrics", err);
                document.getElementById('last-updated').innerText = 'Connection Error - Retrying...';
                document.getElementById('status-indicator').style.backgroundColor = 'var(--accent-red)';
            }
        }

        function updateDashboard(data) {
            // Update Text Panels
            document.getElementById('trafficTotal').innerText = data.traffic;
            document.getElementById('costTotal').innerText = '$' + data.total_cost_usd.toFixed(4);
            document.getElementById('costAvg').innerText = 'Avg: $' + data.avg_cost_usd.toFixed(4) + ' / req';
            document.getElementById('qualityAvg').innerText = data.quality_avg.toFixed(2);

            // Update Time series arrays
            const timeStr = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'});
            timeLabels.push(timeStr);
            p50Data.push(data.latency_p50);
            p95Data.push(data.latency_p95);
            p99Data.push(data.latency_p99);

            if(timeLabels.length > maxDataPoints) {
                timeLabels.shift(); p50Data.shift(); p95Data.shift(); p99Data.shift();
            }
            latencyChart.update();

            // Update Tokens Chart
            tokenChart.data.datasets[0].data = [data.tokens_in_total];
            tokenChart.data.datasets[1].data = [data.tokens_out_total];
            tokenChart.update();

            // Update Error Chart
            const errKeys = Object.keys(data.error_breakdown);
            if(errKeys.length > 0) {
                errorChart.data.labels = errKeys;
                errorChart.data.datasets[0].data = errKeys.map(k => data.error_breakdown[k]);
                // generate some colors
                const colors = ['#ef4444', '#f59e0b', '#3b82f6', '#8b5cf6', '#ec4899'];
                errorChart.data.datasets[0].backgroundColor = errKeys.map((_, i) => colors[i % colors.length]);
            } else {
                errorChart.data.labels = ['No Errors'];
                errorChart.data.datasets[0].data = [1];
                errorChart.data.datasets[0].backgroundColor = ['#1e293b'];
            }
            errorChart.update();
        }

        window.onload = () => {
            initCharts();
            fetchMetrics();
            setInterval(fetchMetrics, 15000); // refresh every 15 seconds as per spec
        };
    </script>
</body>
</html>
